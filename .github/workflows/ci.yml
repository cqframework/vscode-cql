name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # --- NEW JOB: Verify Changelog ---
  verify-changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Changelog Format
        shell: node {0}
        run: |
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const version = pkg.version;
          const [major, minor, patch] = version.split('.').map(Number);
          
          const isPrerelease = minor % 2 !== 0;
          const expectedHeader = isPrerelease ? `## v${version} (prerelease)` : `## v${version}`;
          
          console.log(`Checking for ${isPrerelease ? 'Prerelease' : 'Release'} version: ${version}`);
          
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          
          // Regex breakdown:
          // \n\n           -> Two newlines (one blank line)
          // ${header}      -> The exact version header
          // \n\n           -> Two newlines (one blank line)
          // Date: \d{4}... -> The date string
          const escapedHeader = expectedHeader.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const pattern = new RegExp(`\\n\\n${escapedHeader}\\n\\nDate: \\d{4}-\\d{2}-\\d{2}`);
          
          if (pattern.test(changelog)) {
            console.log('✅ CHANGELOG.md is correctly formatted.');
          } else {
            console.error(`\x1b[31m%s\x1b[0m`, `❌ Error: CHANGELOG.md is missing an entry or formatted incorrectly.`);
            console.error(`Expected format:\n\n[Blank Line]\n${expectedHeader}\n\nDate: YYYY-MM-DD`);
            process.exit(1);
          }

  # --- EXISTING JOB: Tests ---
  test:
    needs: verify-changelog  # Prevents tests from running if changelog is wrong
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read
      pull-requests: write  # required to post the coverage comment

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Coverage is reported but not enforced. To add a threshold that fails the
      # build, append one or more of these flags to both test commands below:
      #   --coverage-lines <0-100>      fail if line coverage drops below N%
      #   --coverage-statements <0-100> fail if statement coverage drops below N%
      #   --coverage-branches <0-100>   fail if branch coverage drops below N%
      #   --coverage-functions <0-100>  fail if function coverage drops below N%
      # Example (80% line + branch gate):
      #   npm test -- --coverage ... --coverage-lines 80 --coverage-branches 80
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test -- --coverage --coverage-reporter text --coverage-reporter lcov --coverage-reporter json-summary

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm test -- --coverage --coverage-reporter text --coverage-reporter lcov --coverage-reporter json-summary

      # Writes a coverage table to the Actions "Summary" tab — visible for every
      # run (push and PR) without downloading any artifact.
      - name: Write coverage to job summary
        if: always()
        shell: node {0}
        run: |
          const fs = require('fs');
          try {
            const total = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf-8')).total;
            const pct  = d => `${d.pct}%`;
            const frac = d => `${d.covered} / ${d.total}`;
            const rows = [
              ['Statements', total.statements],
              ['Branches',   total.branches],
              ['Functions',  total.functions],
              ['Lines',      total.lines],
            ].map(([label, d]) => `| ${label} | ${pct(d)} | ${frac(d)} |`).join('\n');
            const md = `## Code Coverage\n\n| Metric | Coverage | Covered / Total |\n|--------|:--------:|:---------------:|\n${rows}\n`;
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
          } catch (e) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Code Coverage\n\nNo coverage data available.\n');
          }

      # Posts a per-file coverage breakdown as a PR comment. Runs once (Linux
      # only) to avoid posting three identical comments from the OS matrix.
      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request' && runner.os == 'Linux'
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          lcov-file: ./coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          delete-old-comments: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage/
          if-no-files-found: ignore
